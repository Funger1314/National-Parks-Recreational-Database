name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: Ruff
        run: |
          . .venv/bin/activate
          ruff check .
      - name: Unit tests
        run: |
          . .venv/bin/activate
          pytest tests/test_visitation_cleaning.py tests/test_data_validation.py

